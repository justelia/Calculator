<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculator 🧮</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="calculator">
    <h1 class="calc-title">Calculator <span class="emoji">🧮</span></h1>

    <div class="display-wrapper">
      <div class="display-label">EXPRESSION</div>
      <input type="text" id="calc-result" disabled placeholder="0">
    </div>

    <div class="buttons">
      <!-- Row 1: Functions + Divide + Multiply -->
      <button class="btn btn-function" onclick="clearDisplay()">C</button>
      <button class="btn btn-function" onclick="deleteLast()">⌫</button>
      <button class="btn btn-operator" onclick="appendValue('/')">÷</button>
      <button class="btn btn-operator" onclick="appendValue('*')">×</button>

      <!-- Row 2 -->
      <button class="btn btn-digit" onclick="appendValue('7')">7</button>
      <button class="btn btn-digit" onclick="appendValue('8')">8</button>
      <button class="btn btn-digit" onclick="appendValue('9')">9</button>
      <button class="btn btn-operator" onclick="appendValue('-')">−</button>

      <!-- Row 3 -->
      <button class="btn btn-digit" onclick="appendValue('4')">4</button>
      <button class="btn btn-digit" onclick="appendValue('5')">5</button>
      <button class="btn btn-digit" onclick="appendValue('6')">6</button>
      <button class="btn btn-operator" onclick="appendValue('+')">+</button>

      <!-- Row 4 + equals spanning 2 rows -->
      <button class="btn btn-digit" onclick="appendValue('1')">1</button>
      <button class="btn btn-digit" onclick="appendValue('2')">2</button>
      <button class="btn btn-digit" onclick="appendValue('3')">3</button>
      <button class="btn btn-equal" onclick="triggerCalculate()">=</button>

      <!-- Row 5 -->
      <button class="btn btn-digit btn-zero" onclick="appendValue('0')">0</button>
      <button class="btn btn-digit" onclick="appendValue('.')">.</button>
    </div>
  </div>

  <script src="script.js"></script>
  <script>
    // Bridge: connect script.js pure functions to the DOM display
    function appendValue(val) {
      const display = document.getElementById('calc-result');
      if (display.dataset.freshResult === 'true' && !isNaN(val) === false && val !== '.') {
        display.dataset.freshResult = 'false';
      }
      if (display.dataset.freshResult === 'true' && !isNaN(val)) {
        display.value = val;
        display.dataset.freshResult = 'false';
        return;
      }
      display.value += val;
    }

    function clearDisplay() {
      const display = document.getElementById('calc-result');
      display.value = '';
      display.dataset.freshResult = 'false';
    }

    function deleteLast() {
      const display = document.getElementById('calc-result');
      display.value = display.value.slice(0, -1);
    }

    function triggerCalculate() {
      const display = document.getElementById('calc-result');
      const expression = display.value;
      if (!expression) return;

      const result = calculate(expression); // from script.js
      display.value = result;
      display.dataset.freshResult = 'true';
    }
  </script>
</body>
</html>
